name = "blueline-portal"
main = "worker.js"
compatibility_date = "2024-01-01"

# Create with: wrangler kv namespace create PORTAL_KV
# Then replace the id below with the id it prints.
[[kv_namespaces]]
binding = "PORTAL_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[assets]
directory = "./public"
binding = "ASSETS"
