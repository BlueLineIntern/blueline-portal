name = "blueline-portal"
main = "worker.js"
compatibility_date = "2024-01-01"

# Create with: wrangler kv namespace create PORTAL_KV
# Then replace the id below with the id it prints.
[[kv_namespaces]]
binding = "PORTAL_KV"
id = "dadc7f3c3d66491bbc97ded5efa59bc4"

[assets]
directory = "./public"
binding = "ASSETS"

[triggers]
crons = ["*/1 * * * *"]

[observability]
enabled = true

[observability.logs]
enabled = true
