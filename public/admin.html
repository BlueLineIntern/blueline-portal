<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BlueLine Advisors — Admin</title>
<link rel="stylesheet" href="assets/style.css" />
<style>
  .admin-container { max-width: 1500px; }
  #clients-card { overflow-x: auto; }
  .admin-table { width: 100%; min-width: 1200px; border-collapse: collapse; margin-top: 20px; }
  .admin-table th, .admin-table td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; white-space: nowrap; }
  .admin-table td.wrap { white-space: normal; max-width: 240px; }
  .admin-table th { color: var(--navy); font-family: Georgia, serif; }
  .admin-empty { color: var(--text-muted); white-space: normal; }
  .token-form { max-width: 400px; }
  .cell-missing { color: var(--text-muted); }
  .cell-flag { color: #c97e2c; font-weight: 700; }
  .cell-negative { color: var(--error); font-weight: 600; }
  .module-count { font-weight: 700; color: var(--navy); }
  .btn-small { padding: 6px 14px; font-size: 0.85rem; }

  /* Client detail view */
  #detail-view { max-width: 900px; margin: 0 auto; }
  .detail-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
  .detail-header h1 { margin: 0; }
  .detail-header-actions { display: flex; gap: 12px; }
  .detail-client-email { color: var(--text-muted); margin: 4px 0 0; }
  .detail-empty-module { color: var(--text-muted); margin: 14px 0 0; }

  /* Print report header — hidden on screen, shown when printing */
  .print-header { display: none; }

  @media print {
    /* Print exactly the detail view as a branded client report */
    body { background: #fff; }
    .topbar, .footer, #token-card, #clients-card, .detail-header-actions { display: none !important; }
    .container { padding: 0; max-width: none; }

    .print-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 3px solid var(--navy);
      padding-bottom: 14px;
      margin-bottom: 22px;
    }
    .print-header-logo {
      background: var(--navy);
      border-radius: 8px;
      padding: 10px 16px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .print-header-logo img { height: 60px; width: auto; display: block; }
    .print-header-title h1 { margin: 0 0 4px; font-size: 1.5rem; }
    .print-header-title p { margin: 2px 0; color: var(--text-muted); font-size: 0.9rem; }

    /* One module per printed page: every card starts on a fresh page.
       The first card shares page 1 with the report header. */
    .module-card {
      box-shadow: none;
      border: none;
      margin-bottom: 0;
      break-before: page;
      page-break-before: always;
      break-inside: avoid;
      page-break-inside: avoid;
    }
    #detail-grid .module-card:first-child {
      break-before: auto;
      page-break-before: auto;
    }
    .module-card-header, .chart-donut, .chart-gauge, .chart-projection,
    .chart-balance, .stat-rows, .stat-bar, .result-flag { break-inside: avoid; }

    /* Preserve chart colors on paper */
    .legend-swatch, .stat-bar-fill, .stack-seg, .stack-track,
    .status-badge, .module-number, .result-flag, .progress-fill {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <img src="assets/wealthadvisorstransparentwhite.png" alt="BlueLine Advisors" class="brand-logo" />
      </div>
    </div>
  </header>

  <main class="container admin-container">
    <div class="card token-form" id="token-card">
      <h2>Admin Access</h2>
      <form id="token-form" class="form">
        <label for="admin-token">Admin Token</label>
        <input type="password" id="admin-token" required />
        <p class="form-error" id="token-error"></p>
        <button type="submit" class="btn btn-primary">View Clients</button>
      </form>
    </div>

    <div class="card hidden" id="clients-card">
      <h1>Client Onboarding Submissions</h1>
      <table class="admin-table" id="clients-table">
        <thead>
          <tr>
            <th></th>
            <th>Name</th>
            <th>Email</th>
            <th>Progress</th>
            <th>Risk Profile</th>
            <th>Cash Flow</th>
            <th>Retirement</th>
            <th>Net Worth</th>
            <th>Compensation</th>
            <th>Flags</th>
            <th>Last Updated</th>
          </tr>
        </thead>
        <tbody id="clients-body"></tbody>
      </table>
    </div>

    <div class="hidden" id="detail-view">
      <div class="print-header">
        <div class="print-header-title">
          <h1>Financial Onboarding Report</h1>
          <p id="print-client-line"></p>
          <p id="print-date-line"></p>
          <p>Prepared by BlueLine Advisors — for discussion purposes only.</p>
        </div>
        <div class="print-header-logo">
          <img src="assets/wealthadvisorstransparentwhite.png" alt="BlueLine Advisors" />
        </div>
      </div>
      <div class="detail-header">
        <div>
          <h1 id="detail-name"></h1>
          <p class="detail-client-email" id="detail-email"></p>
        </div>
        <div class="detail-header-actions">
          <button type="button" class="btn btn-primary" id="detail-print-btn">Print / Save PDF</button>
          <button type="button" class="btn btn-secondary" id="detail-back-btn">← Back to All Clients</button>
        </div>
      </div>
      <div class="module-grid" id="detail-grid"></div>
    </div>
  </main>

  <script src="assets/render.js"></script>
  <script>
    const tokenForm = document.getElementById('token-form');
    const tokenCard = document.getElementById('token-card');
    const clientsCard = document.getElementById('clients-card');
    const clientsBody = document.getElementById('clients-body');
    const tokenError = document.getElementById('token-error');
    const detailView = document.getElementById('detail-view');

    let allClients = [];

    tokenForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      tokenError.textContent = '';
      const token = document.getElementById('admin-token').value;

      try {
        const res = await fetch('/api/admin/clients', {
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load clients');

        allClients = data.clients;
        renderClients(allClients);
        tokenCard.classList.add('hidden');
        clientsCard.classList.remove('hidden');
      } catch (err) {
        tokenError.textContent = err.message;
      }
    });

    function money(n) {
      const v = Number(n || 0);
      return (v < 0 ? '-$' : '$') + Math.abs(Math.round(v)).toLocaleString();
    }

    function missing() {
      return '<span class="cell-missing">—</span>';
    }

    function renderClients(clients) {
      if (!clients.length) {
        clientsBody.innerHTML = '<tr><td colspan="11" class="admin-empty">No client accounts yet.</td></tr>';
        return;
      }

      clientsBody.innerHTML = clients
        .map((c, index) => {
          const m = c.modules || {};
          const done = MODULES.filter((mod) => m[mod.key]).length;

          const risk = m.risk
            ? `${m.risk.score} / 25<br>${escapeHtml(m.risk.category)}`
            : missing();

          const budget = m.budget
            ? `Income ${money(m.budget.monthlyIncome)}/mo<br>Savings rate ${m.budget.savingsRate}%` +
              (m.budget.surplus < 0 ? `<br><span class="cell-negative">Overspending ${money(-m.budget.surplus)}/mo</span>` : '')
            : missing();

          const retirement = m.retirement
            ? `Retire at ${m.retirement.targetAge}<br>Projected ${money(m.retirement.projectedBalance)}<br>` +
              (m.retirement.readinessPct != null ? `${m.retirement.readinessPct}% of target` : '')
            : missing();

          const networth = m.networth
            ? `<span class="${m.networth.netWorth < 0 ? 'cell-negative' : ''}">${money(m.networth.netWorth)}</span>` +
              `<br>A ${money(m.networth.totalAssets)} / L ${money(m.networth.totalLiabilities)}`
            : missing();

          const comp = m.compensation
            ? `Total ${money(m.compensation.totalComp)}<br>Equity ${money(m.compensation.annualEquityValue)}/yr`
            : missing();

          const flags = [];
          if (m.retirement && m.retirement.oldEmployerPlans !== 'none') flags.push('Rollover opportunity');
          if (m.compensation && m.compensation.concentrationFlag) flags.push('Stock concentration');
          if (m.compensation && m.compensation.contributionPct < m.compensation.employerMatchPct) flags.push('Missing 401(k) match');
          if (m.budget && m.budget.surplus < 0) flags.push('Negative cash flow');

          const updatedAts = MODULES.map((mod) => m[mod.key] && m[mod.key].updatedAt).filter(Boolean);
          const lastUpdated = updatedAts.length
            ? new Date(updatedAts.sort().slice(-1)[0]).toLocaleString()
            : missing();

          return `<tr>
            <td><button type="button" class="btn btn-secondary btn-small detail-btn" data-index="${index}" ${done ? '' : 'disabled title="No submissions yet"'}>Details</button></td>
            <td>${escapeHtml(c.name)}</td>
            <td>${escapeHtml(c.email)}</td>
            <td><span class="module-count">${done} / ${MODULES.length}</span></td>
            <td>${risk}</td>
            <td>${budget}</td>
            <td>${retirement}</td>
            <td>${networth}</td>
            <td>${comp}</td>
            <td class="wrap">${flags.length ? `<span class="cell-flag">${flags.map(escapeHtml).join('<br>')}</span>` : missing()}</td>
            <td>${lastUpdated}</td>
          </tr>`;
        })
        .join('');

      clientsBody.querySelectorAll('.detail-btn').forEach((btn) => {
        btn.addEventListener('click', () => showDetail(Number(btn.dataset.index)));
      });
    }

    // Renders the client's modules exactly as they see them, using the same
    // renderers as the client dashboard (render.js).
    function showDetail(index) {
      const client = allClients[index];
      if (!client) return;
      const m = client.modules || {};

      document.getElementById('detail-name').textContent = client.name;
      document.getElementById('detail-email').textContent = client.email;
      document.getElementById('print-client-line').textContent = `Client: ${client.name} (${client.email})`;
      document.getElementById('print-date-line').textContent = `Report date: ${new Date().toLocaleDateString()}`;

      document.getElementById('detail-grid').innerHTML = MODULES.map((mod, i) => {
        const data = m[mod.key];
        if (!data) {
          return `
            <div class="card module-card module-card-empty">
              <div class="module-card-header">
                <span class="module-number">${i + 1}</span>
                <h2>${escapeHtml(mod.title)}</h2>
                <span class="status-badge status-pending">Not started</span>
              </div>
              <p class="detail-empty-module">The client hasn't completed this assessment yet.</p>
            </div>`;
        }
        return `
          <div class="card module-card">
            <div class="module-card-header">
              <span class="module-number done">✓</span>
              <h2>${escapeHtml(mod.title)}</h2>
              <span class="status-badge status-done">Completed</span>
            </div>
            <div class="module-result">${mod.renderResult(data)}</div>
            <div class="module-card-footer">
              <span class="updated-at-inline">Updated ${data.updatedAt ? new Date(data.updatedAt).toLocaleString() : ''}</span>
            </div>
          </div>`;
      }).join('');

      clientsCard.classList.add('hidden');
      detailView.classList.remove('hidden');
      window.scrollTo(0, 0);
    }

    document.getElementById('detail-print-btn').addEventListener('click', () => window.print());

    document.getElementById('detail-back-btn').addEventListener('click', () => {
      detailView.classList.add('hidden');
      clientsCard.classList.remove('hidden');
      window.scrollTo(0, 0);
    });
  </script>
</body>
</html>
