<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BlueLine Advisors — Admin</title>
<link rel="stylesheet" href="assets/style.css" />
<style>
  .admin-container { max-width: 1500px; }
  #clients-card { overflow-x: auto; }
  .admin-table { width: 100%; min-width: 1200px; border-collapse: collapse; margin-top: 20px; }
  .admin-table th, .admin-table td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; white-space: nowrap; }
  .admin-table td.wrap { white-space: normal; max-width: 240px; }
  .admin-table th { color: var(--navy); font-family: Georgia, serif; }
  .admin-empty { color: var(--text-muted); white-space: normal; }
  .token-form { max-width: 400px; }
  .cell-missing { color: var(--text-muted); }
  .cell-flag { color: #c97e2c; font-weight: 700; }
  .cell-negative { color: var(--error); font-weight: 600; }
  .module-count { font-weight: 700; color: var(--navy); }
</style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <img src="assets/wealthadvisorstransparentwhite.png" alt="BlueLine Advisors" class="brand-logo" />
      </div>
    </div>
  </header>

  <main class="container admin-container">
    <div class="card token-form" id="token-card">
      <h2>Admin Access</h2>
      <form id="token-form" class="form">
        <label for="admin-token">Admin Token</label>
        <input type="password" id="admin-token" required />
        <p class="form-error" id="token-error"></p>
        <button type="submit" class="btn btn-primary">View Clients</button>
      </form>
    </div>

    <div class="card hidden" id="clients-card">
      <h1>Client Onboarding Submissions</h1>
      <table class="admin-table" id="clients-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Progress</th>
            <th>Risk Profile</th>
            <th>Cash Flow</th>
            <th>Retirement</th>
            <th>Net Worth</th>
            <th>Compensation</th>
            <th>Flags</th>
            <th>Last Updated</th>
          </tr>
        </thead>
        <tbody id="clients-body"></tbody>
      </table>
    </div>
  </main>

  <script>
    const MODULE_KEYS = ['risk', 'budget', 'retirement', 'networth', 'compensation'];

    const tokenForm = document.getElementById('token-form');
    const tokenCard = document.getElementById('token-card');
    const clientsCard = document.getElementById('clients-card');
    const clientsBody = document.getElementById('clients-body');
    const tokenError = document.getElementById('token-error');

    tokenForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      tokenError.textContent = '';
      const token = document.getElementById('admin-token').value;

      try {
        const res = await fetch('/api/admin/clients', {
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load clients');

        renderClients(data.clients);
        tokenCard.classList.add('hidden');
        clientsCard.classList.remove('hidden');
      } catch (err) {
        tokenError.textContent = err.message;
      }
    });

    function money(n) {
      const v = Number(n || 0);
      return (v < 0 ? '-$' : '$') + Math.abs(Math.round(v)).toLocaleString();
    }

    function missing() {
      return '<span class="cell-missing">—</span>';
    }

    function renderClients(clients) {
      if (!clients.length) {
        clientsBody.innerHTML = '<tr><td colspan="10" class="admin-empty">No client accounts yet.</td></tr>';
        return;
      }

      clientsBody.innerHTML = clients
        .map((c) => {
          const m = c.modules || {};
          const done = MODULE_KEYS.filter((k) => m[k]).length;

          const risk = m.risk
            ? `${m.risk.score} / 25<br>${escapeHtml(m.risk.category)}`
            : missing();

          const budget = m.budget
            ? `Income ${money(m.budget.monthlyIncome)}/mo<br>Savings rate ${m.budget.savingsRate}%` +
              (m.budget.surplus < 0 ? `<br><span class="cell-negative">Overspending ${money(-m.budget.surplus)}/mo</span>` : '')
            : missing();

          const retirement = m.retirement
            ? `Retire at ${m.retirement.targetAge}<br>Projected ${money(m.retirement.projectedBalance)}<br>` +
              (m.retirement.readinessPct != null ? `${m.retirement.readinessPct}% of target` : '')
            : missing();

          const networth = m.networth
            ? `<span class="${m.networth.netWorth < 0 ? 'cell-negative' : ''}">${money(m.networth.netWorth)}</span>` +
              `<br>A ${money(m.networth.totalAssets)} / L ${money(m.networth.totalLiabilities)}`
            : missing();

          const comp = m.compensation
            ? `Total ${money(m.compensation.totalComp)}<br>Equity ${money(m.compensation.annualEquityValue)}/yr`
            : missing();

          const flags = [];
          if (m.retirement && m.retirement.oldEmployerPlans !== 'none') flags.push('Rollover opportunity');
          if (m.compensation && m.compensation.concentrationFlag) flags.push('Stock concentration');
          if (m.compensation && m.compensation.contributionPct < m.compensation.employerMatchPct) flags.push('Missing 401(k) match');
          if (m.budget && m.budget.surplus < 0) flags.push('Negative cash flow');

          const updatedAts = MODULE_KEYS.map((k) => m[k] && m[k].updatedAt).filter(Boolean);
          const lastUpdated = updatedAts.length
            ? new Date(updatedAts.sort().slice(-1)[0]).toLocaleString()
            : missing();

          return `<tr>
            <td>${escapeHtml(c.name)}</td>
            <td>${escapeHtml(c.email)}</td>
            <td><span class="module-count">${done} / ${MODULE_KEYS.length}</span></td>
            <td>${risk}</td>
            <td>${budget}</td>
            <td>${retirement}</td>
            <td>${networth}</td>
            <td>${comp}</td>
            <td class="wrap">${flags.length ? `<span class="cell-flag">${flags.map(escapeHtml).join('<br>')}</span>` : missing()}</td>
            <td>${lastUpdated}</td>
          </tr>`;
        })
        .join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str == null ? '' : String(str);
      return div.innerHTML;
    }
  </script>
</body>
</html>
