<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="/assets/blueline-logo.png" type="image/png" />
<title>Dashboard — BlueLine Admin</title>
<link rel="stylesheet" href="/admin/shared.css" />
<style>
  .queue-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .queue-chip {
    display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
    padding: 8px 14px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--panel); color: var(--text); font-size: 0.85rem; font-weight: 550;
    box-shadow: var(--shadow);
  }
  .queue-chip:hover { border-color: var(--sky); text-decoration: none; }
  .queue-chip .qc-count { background: var(--navy); color: #fff; border-radius: 999px; padding: 1px 8px; font-size: 0.75rem; font-weight: 700; }
  .queue-chip.zero { opacity: 0.55; }
  .queue-chip.zero .qc-count { background: var(--gray-bg); color: var(--muted); }
  .task-check { width: 18px; height: 18px; accent-color: var(--sky); cursor: pointer; margin-top: 2px; flex-shrink: 0; }
  .alert-item { display: flex; gap: 10px; padding: 9px 2px; border-bottom: 1px solid var(--border); font-size: 0.9rem; align-items: flex-start; }
  .alert-item:last-child { border-bottom: none; }
  .alert-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar-root"></aside>
  <main class="content">
    <div class="page-head">
      <div>
        <h1 id="dash-greeting">Dashboard</h1>
        <p class="sub" id="dash-date"></p>
      </div>
      <div class="page-actions">
        <button type="button" class="btn btn-ghost btn-small" id="dash-refresh">↻ Refresh</button>
      </div>
    </div>

    <div class="stat-tiles" id="stat-tiles"></div>
    <div class="queue-row" id="queue-row"></div>

    <div class="widget-grid">
      <div class="panel">
        <div class="panel-head"><h2>Operations</h2><a class="panel-link" href="/admin/operations.html">Open board →</a></div>
        <div class="row-list" id="w-ops"></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h2>Today's Tasks</h2><a class="panel-link" href="/admin/tasks.html?f=today">View →</a></div>
        <div class="row-list" id="w-today"></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h2>Overdue</h2><a class="panel-link" href="/admin/tasks.html?f=overdue">View →</a></div>
        <div class="row-list" id="w-overdue"></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h2>Upcoming Meetings</h2><a class="panel-link" href="/admin/tasks.html?cat=meeting">View →</a></div>
        <div class="row-list" id="w-meetings"></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h2>Waiting for Review</h2><a class="panel-link" href="/admin/tasks.html?cat=review">View →</a></div>
        <div class="row-list" id="w-review"></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h2>Recent Client Activity</h2><a class="panel-link" href="/admin/contacts.html">Contacts →</a></div>
        <div class="row-list" id="w-activity"></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h2>Compliance Alerts</h2><a class="panel-link" href="/admin/settings.html">Settings →</a></div>
        <div id="w-alerts"></div>
      </div>
    </div>
  </main>
</div>

<script src="/admin/shared.js"></script>
<script>
  initShell('dashboard');

  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  const who = (SESSION.email || '').split('@')[0];
  document.getElementById('dash-greeting').textContent = `${greeting}${who ? ', ' + who : ''}`;
  document.getElementById('dash-date').textContent = new Date().toLocaleDateString(undefined, {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
  });

  const ALL_KEYS_HINT = 18; // 17 modules + wizard; used only for progress text

  function isSameLocalDay(a, b) {
    return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
  }

  function tile(num, label, href, danger) {
    const inner = `<div class="num" ${danger ? 'style="color:var(--red)"' : ''}>${num}</div><div class="lbl">${escapeHtml(label)}</div>`;
    return href ? `<a class="stat-tile" href="${href}">${inner}</a>` : `<div class="stat-tile">${inner}</div>`;
  }

  function chip(count, label, href) {
    return `<a class="queue-chip ${count ? '' : 'zero'}" href="${href}"><span class="qc-count">${count}</span>${escapeHtml(label)}</a>`;
  }

  function taskRow(t, contacts) {
    const c = contacts.find((x) => x.email === t.client);
    const clientBit = t.client
      ? ` · <a href="/admin/contacts.html?c=${encodeURIComponent(t.client)}">${escapeHtml((c && c.name) || t.client)}</a>`
      : '';
    const due = t.due ? new Date(t.due).toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : 'no due date';
    return `<div class="row-item">
      <input type="checkbox" class="task-check" data-id="${escapeHtml(t.id)}" title="Mark complete" />
      <div class="row-main">
        <div class="row-title">${escapeHtml(t.title)}${t.createdBy === 'auto' ? ' <span class="badge badge-navy">auto</span>' : ''}</div>
        <div class="row-sub">${escapeHtml(due)}${clientBit} · ${t.assignee ? escapeHtml(t.assignee.split('@')[0]) : 'unassigned'}</div>
      </div>
    </div>`;
  }

  function fill(id, html, emptyText) {
    document.getElementById(id).innerHTML = html || `<p class="empty">${emptyText}</p>`;
  }

  async function load() {
    try {
      const [contactData, taskData, actData, onbData, adminData] = await Promise.all([
        api('/api/admin/contacts'),
        api('/api/admin/tasks'),
        api('/api/admin/activity'),
        api('/api/admin/onboarding').catch(() => ({ records: [] })),
        api('/api/admin/admins').catch(() => ({ admins: [] })),
      ]);
      const contacts = contactData.contacts || [];
      const tasks = (taskData.tasks || []).filter((t) => t.status === 'open');
      const activity = actData.entries || [];
      const onbs = (onbData.records || []).filter((r) => !r.deleted);
      const now = new Date();

      // ----- Stat tiles -----
      const byStatus = (s) => contacts.filter((c) => c.status === s).length;
      const dueToday = tasks.filter((t) => t.due && isSameLocalDay(new Date(t.due), now));
      const overdue = tasks.filter((t) => t.due && new Date(t.due) < now && !isSameLocalDay(new Date(t.due), now));
      document.getElementById('stat-tiles').innerHTML = [
        tile(byStatus('active'), 'Active Clients', '/admin/contacts.html'),
        tile(byStatus('prospect'), 'Prospects', '/admin/contacts.html'),
        tile(byStatus('onboarding'), 'Onboarding', '/admin/contacts.html'),
        tile(dueToday.length, 'Tasks Due Today', '/admin/tasks.html?f=today'),
        tile(overdue.length, 'Overdue', '/admin/tasks.html?f=overdue', overdue.length > 0),
      ].join('');

      // ----- Work queues -----
      const reviewTasks = tasks.filter((t) => t.category === 'review');
      const onbTasks = tasks.filter((t) => t.category === 'onboarding');
      const unsigned = onbs.filter((r) => r.completionTime && !(r.data && r.data.agreement && r.data.agreement.signatureDataUrl));
      const waitingOnClient = contacts.filter((c) => {
        if (!c.hasAccount) return false;
        const doneCount = Object.keys(c.modules || {}).length;
        const totalCount = c.assignments == null ? ALL_KEYS_HINT : c.assignments.length;
        return doneCount < totalCount;
      });
      document.getElementById('queue-row').innerHTML = [
        chip(reviewTasks.length, 'Assessments to review', '/admin/tasks.html?cat=review'),
        chip(onbTasks.length, 'Onboarding to review', '/admin/tasks.html?cat=onboarding'),
        chip(unsigned.length, 'Unsigned agreements', '/admin/onboarding.html'),
        chip(waitingOnClient.length, 'Waiting on client', '/admin/contacts.html'),
        chip(overdue.length, 'Overdue tasks', '/admin/tasks.html?f=overdue'),
      ].join('');

      // ----- Widgets -----
      const meetings = tasks
        .filter((t) => t.category === 'meeting' && t.due && new Date(t.due) >= new Date(now.getFullYear(), now.getMonth(), now.getDate()))
        .sort((a, b) => new Date(a.due) - new Date(b.due));
      fill('w-today', dueToday.map((t) => taskRow(t, contacts)).join(''), 'Nothing due today.');
      fill('w-overdue', overdue.map((t) => taskRow(t, contacts)).join(''), 'Nothing overdue. Well done.');
      fill('w-meetings', meetings.slice(0, 6).map((t) => taskRow(t, contacts)).join(''), 'No meetings scheduled — add one as a task with the Meeting category.');
      fill('w-review', reviewTasks.concat(onbTasks).slice(0, 6).map((t) => taskRow(t, contacts)).join(''), 'Nothing waiting for review.');

      // ----- Operations widget: quick pulse into the board -----
      const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const myToday = dueToday.filter((t) => t.assignee === SESSION.email);
      const dueThisWeek = tasks.filter((t) => {
        if (!t.due) return false;
        const d = new Date(t.due);
        return !isNaN(d) && d >= startOfToday && d - startOfToday < 7 * 86400e3;
      });
      const opsRow = (label, count, filter, danger) =>
        `<a class="row-item" style="text-decoration:none;color:inherit" href="/admin/operations.html?filter=${filter}">
          <div class="row-main"><div class="row-title">${escapeHtml(label)}</div></div>
          <div class="row-side"><span class="badge ${danger && count ? 'badge-red' : 'badge-gray'}">${count}</span></div>
        </a>`;
      document.getElementById('w-ops').innerHTML =
        opsRow('My tasks today', myToday.length, 'today') +
        opsRow('Overdue tasks', overdue.length, 'overdue', true) +
        opsRow('Due this week', dueThisWeek.length, 'week');

      fill('w-activity', activity.slice(0, 8).map((e) => {
        const c = contacts.find((x) => x.email === e.client);
        const label = TL_LABELS[e.type] || e.type;
        const extra = e.detail && (e.detail.module || e.detail.onboardingId || e.detail.title);
        return `<div class="row-item">
          <div class="row-main">
            <div class="row-title"><a href="/admin/contacts.html?c=${encodeURIComponent(e.client)}">${escapeHtml((c && c.name) || e.client)}</a></div>
            <div class="row-sub">${escapeHtml(label)}${extra ? ` (${escapeHtml(extra)})` : ''}</div>
          </div>
          <div class="row-side"><span class="cell-missing">${escapeHtml(relTime(e.ts))}</span></div>
        </div>`;
      }).join(''), 'No client activity yet.');

      // ----- Compliance alerts (rule-based) -----
      const alerts = [];
      unsigned.forEach((r) => alerts.push({
        level: 'red',
        text: `Onboarding ${r.onboardingId} is complete but the advisory agreement is unsigned.`,
        href: `/admin/onboarding.html?id=${encodeURIComponent(r.onboardingId)}`,
      }));
      (adminData.admins || []).filter((a) => !a.mfaEnabled).forEach((a) => alerts.push({
        level: 'red',
        text: `Admin ${a.email} has not set up two-factor authentication.`,
        href: '/admin/settings.html',
      }));
      contacts.filter((c) => c.hasAccount && c.status === 'active').forEach((c) => {
        let newest = c.updatedAt || null;
        Object.values(c.modules || {}).forEach((m) => {
          if (m && m.updatedAt && (!newest || m.updatedAt > newest)) newest = m.updatedAt;
        });
        if (newest && (now - new Date(newest)) > 90 * 86400e3) {
          alerts.push({
            level: 'amber',
            text: `${c.name || c.email}: no recorded activity in over 90 days.`,
            href: `/admin/contacts.html?c=${encodeURIComponent(c.email)}`,
          });
        }
      });
      fill('w-alerts', alerts.map((a) => `
        <a class="alert-item" style="text-decoration:none;color:inherit" href="${a.href}">
          <span class="alert-dot" style="background:var(--${a.level === 'red' ? 'red' : 'amber'})"></span>
          <span>${escapeHtml(a.text)}</span>
        </a>`).join(''), 'No compliance alerts. All clear.');

      // Complete-from-dashboard checkboxes
      document.querySelectorAll('.task-check').forEach((cb) =>
        cb.addEventListener('change', async () => {
          try {
            await api(`/api/admin/tasks/${encodeURIComponent(cb.dataset.id)}`, {
              method: 'POST', body: JSON.stringify({ status: 'done' }),
            });
            load();
          } catch { cb.checked = false; }
        })
      );
    } catch (err) {
      document.getElementById('w-activity').innerHTML = `<p class="empty">Failed to load: ${escapeHtml(err.message)}</p>`;
    }
  }

  document.getElementById('dash-refresh').addEventListener('click', load);
  setInterval(load, 30000);
  load();
</script>
</body>
</html>
